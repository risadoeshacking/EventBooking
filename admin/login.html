<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventSpace — Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: #faf8f6;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-container {
        width: 100%;
        max-width: 400px;
        padding: 24px;
      }
      .login-card {
        background: #fff;
        border-radius: 20px;
        padding: 40px 32px 32px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(107, 15, 26, 0.06);
      }
      .login-logo {
        text-align: center;
        margin-bottom: 28px;
      }
      .login-logo-icon {
        width: 48px;
        height: 48px;
        background: #6b0f1a;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 24px;
        color: #fff;
        margin-bottom: 12px;
      }
      .login-logo h1 {
        font-size: 20px;
        font-weight: 800;
        color: #1a1a1a;
        letter-spacing: -0.03em;
      }
      .login-logo p {
        font-size: 13px;
        color: #6b6b6b;
        font-weight: 500;
        margin-top: 4px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #1a1a1a;
        margin-bottom: 6px;
      }
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid rgba(107, 15, 26, 0.1);
        border-radius: 10px;
        font-size: 15px;
        font-family: inherit;
        font-weight: 500;
        color: #1a1a1a;
        background: #faf8f6;
        transition: all 250ms cubic-bezier(0.22, 1, 0.36, 1);
        outline: none;
      }
      .form-group input:focus {
        border-color: #6b0f1a;
        box-shadow: 0 0 0 3px rgba(107, 15, 26, 0.1);
        background: #fff;
      }
      .login-btn {
        width: 100%;
        padding: 14px 24px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #6b0f1a, #4a0911);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: all 300ms cubic-bezier(0.22, 1, 0.36, 1);
        margin-top: 8px;
      }
      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(107, 15, 26, 0.25);
      }
      .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .login-error {
        color: #ef4444;
        font-size: 13px;
        font-weight: 600;
        text-align: center;
        margin-top: 12px;
        display: none;
      }
      .login-info {
        text-align: center;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid rgba(107, 15, 26, 0.06);
      }
      .login-info p {
        font-size: 12px;
        color: #6b6b6b;
        font-weight: 500;
      }
      .login-info code {
        font-size: 12px;
        background: rgba(107, 15, 26, 0.06);
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 600;
        color: #6b0f1a;
      }
      .spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 600ms linear infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .back-link {
        display: block;
        text-align: center;
        margin-top: 16px;
        font-size: 13px;
        font-weight: 600;
        color: #6b6b6b;
        text-decoration: none;
      }
      .back-link:hover {
        color: #6b0f1a;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <div class="login-logo-icon">E</div>
          <h1>Admin Login</h1>
          <p>EventSpace Management Portal</p>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              placeholder="admin@eventspace.com"
              value="admin@eventspace.com"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              id="password"
              type="password"
              placeholder="Enter password"
              value="Admin123"
              required
            />
          </div>
          <button type="submit" id="loginBtn" class="login-btn">
            <span id="btnText">Sign In</span>
            <span id="btnSpinner" class="spinner"></span>
          </button>
          <div id="loginError" class="login-error">Invalid credentials</div>
        </form>
        <div class="login-info">
          <p>
            Default: <code>admin@eventspace.com</code> / <code>Admin123</code>
          </p>
        </div>
        <a href="/" class="back-link">← Back to Home</a>
      </div>
    </div>
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          var email = document.getElementById("email").value.trim();
          var password = document.getElementById("password").value.trim();
          var btn = document.getElementById("loginBtn");
          var btnText = document.getElementById("btnText");
          var btnSpinner = document.getElementById("btnSpinner");
          var errorEl = document.getElementById("loginError");

          errorEl.style.display = "none";
          btn.disabled = true;
          btnText.style.display = "none";
          btnSpinner.style.display = "block";

          try {
            var res = await fetch("/api/admin/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email: email, password: password }),
            });
            var data = await res.json();
            if (res.ok && data.token) {
              localStorage.setItem("eventspace_token", data.token);
              window.location.href = "dashboard.html";
            } else {
              errorEl.textContent = data.message || "Invalid credentials";
              errorEl.style.display = "block";
              btn.disabled = false;
              btnText.style.display = "inline";
              btnSpinner.style.display = "none";
            }
          } catch (err) {
            errorEl.textContent = "Connection error. Server running?";
            errorEl.style.display = "block";
            btn.disabled = false;
            btnText.style.display = "inline";
            btnSpinner.style.display = "none";
          }
        });
    </script>
  </body>
</html>
