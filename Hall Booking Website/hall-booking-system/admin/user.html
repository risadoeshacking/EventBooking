<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventSpace — Manage Users</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <a href="/admin/dashboard.html" class="admin-sidebar-logo">
          <span class="logo-icon">E</span>
          <span class="logo-text">EventSpace Admin</span>
        </a>
        <a href="dashboard.html" class="admin-nav-item">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="bookings.html" class="admin-nav-item">
          <span class="nav-icon">📅</span> Bookings
        </a>
        <a href="halls.html" class="admin-nav-item">
          <span class="nav-icon">🏛️</span> Halls
        </a>
        <a href="user.html" class="admin-nav-item active">
          <span class="nav-icon">👥</span> Users
        </a>
        <a href="reports.html" class="admin-nav-item">
          <span class="nav-icon">📈</span> Reports
        </a>
        <div
          style="
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--admin-border);
          "
        >
          <a href="/" class="admin-nav-item">
            <span class="nav-icon">←</span> Back to Site
          </a>
        </div>
      </aside>

      <main class="admin-main">
        <div class="admin-header">
          <h1>Users</h1>
          <div class="admin-search">
            <input
              type="text"
              id="searchInput"
              class="admin-input"
              placeholder="Search by name or email..."
            />
            <button class="admin-btn admin-btn-primary" id="searchBtn">
              Search
            </button>
            <button class="admin-btn admin-btn-outline" id="refreshBtn">
              🔄
            </button>
          </div>
        </div>

        <div class="admin-card">
          <div class="admin-card-header">
            <h2>All Users</h2>
            <span class="card-badge" id="userCount">—</span>
          </div>
          <div style="overflow-x: auto">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Registered</th>
                </tr>
              </thead>
              <tbody id="usersTbody">
                <tr>
                  <td
                    colspan="4"
                    style="
                      text-align: center;
                      color: var(--admin-muted);
                      padding: 24px;
                    "
                  >
                    Loading...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script>
      const token = localStorage.getItem("eventspace_token");

      async function loadUsers() {
        const q = document.getElementById("searchInput")?.value?.trim() || "";
        const params = new URLSearchParams({ limit: 100 });
        if (q) params.set("q", q);
        try {
          const r = await fetch("/api/users/admin?" + params, {
            headers: { Authorization: "Bearer " + token },
          });
          if (r.status === 401) {
            localStorage.removeItem("eventspace_token");
            window.location.href = "/login.html";
            return;
          }
          const data = await r.json();
          const users = data.users || [];
          document.getElementById("userCount").textContent =
            users.length + " user(s)";

          const tbody = document.getElementById("usersTbody");
          if (!users.length) {
            tbody.innerHTML =
              '<tr><td colspan="4" style="text-align:center;color:var(--admin-muted);padding:24px;">No users found.</td></tr>';
            return;
          }
          tbody.innerHTML = users
            .map(function (u) {
              var date = u.created_at
                ? new Date(u.created_at).toISOString().slice(0, 10)
                : "—";
              return (
                "<tr><td><strong>" +
                (u.full_name || "—") +
                "</strong></td><td>" +
                u.email +
                "</td><td>" +
                (u.phone || "—") +
                "</td><td>" +
                date +
                "</td></tr>"
              );
            })
            .join("");
        } catch (e) {
          console.error(e);
        }
      }

      document
        .getElementById("refreshBtn")
        ?.addEventListener("click", loadUsers);
      document
        .getElementById("searchBtn")
        ?.addEventListener("click", loadUsers);
      document
        .getElementById("searchInput")
        ?.addEventListener("keyup", function (e) {
          if (e.key === "Enter") loadUsers();
        });
      loadUsers();
    </script>
  </body>
</html>
