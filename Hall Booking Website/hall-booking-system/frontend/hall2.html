<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventSpace — Hall 2</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-[var(--bg)] text-[var(--text)] font-[Inter]">
    <header

      <nav

      >
        <a href="/" class="flex items-center gap-2">
          <span
            class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-white text-black font-bold"
            >E</span
          >
          <span class="text-lg font-semibold tracking-tight">EventSpace</span>
        </a>

        <a class="btn btn-secondary" href="/halls.html">Back</a>
      </nav>
    </header>

    <main class="mx-auto max-w-6xl px-4 sm:px-6 py-10 sm:py-14">
      <div class="glass rounded-3xl p-6 sm:p-8">
        <div class="flex items-start gap-4">
          <div class="text-3xl">🏢</div>
          <div class="space-y-2">
            <h1 class="text-2xl sm:text-3xl font-bold">Hall 2</h1>
            <p class="text-[var(--muted)]">Loading availability calendar...</p>
          </div>
        </div>
      </div>
    </main>

    <script>
      // Hall 2 wrapper page: immediately redirect to dedicated full-screen calendar.
      (function () {
        window.location.href = "/hall2-calendar.html";
      })();
    </script>
