<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventSpace — Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/auth.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[var(--bg)] text-[var(--text)] font-[Inter]">
    <header
      class="sticky top-0 z-50 border-b border-white/10 bg-[rgba(10,16,29,0.55)] backdrop-blur-xl"
    >
      <nav
        class="mx-auto max-w-6xl px-4 sm:px-6 py-3 flex items-center justify-between"
      >
        <a href="/" class="flex items-center gap-2">
          <span
            class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-gradient-to-br from-fuchsia-500 to-cyan-400 text-black font-bold"
            >E</span
          >
          <span class="text-lg font-semibold tracking-tight">EventSpace</span>
        </a>
        <a class="btn btn-secondary" href="/login.html">Login</a>
      </nav>
    </header>

    <main class="mx-auto max-w-6xl px-4 sm:px-6 py-10 sm:py-14">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        <div class="lg:col-span-7">
          <div class="glass rounded-3xl p-6 sm:p-8">
            <h1 class="text-2xl sm:text-3xl font-bold">Create your account</h1>
            <p class="text-[var(--muted)] mt-2">
              Save bookings, track availability, and manage your profile.
            </p>

            <form
              id="registerForm"
              class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4"
              novalidate
            >
              <label class="field">
                <span>Full Name</span>
                <input
                  id="fullName"
                  class="input"
                  type="text"
                  autocomplete="name"
                  required
                />
              </label>
              <label class="field">
                <span>Email</span>
                <input
                  id="email"
                  class="input"
                  type="email"
                  autocomplete="email"
                  required
                />
              </label>

              <label class="field sm:col-span-2">
                <span>Phone Number</span>
                <input
                  id="phone"
                  class="input"
                  type="tel"
                  autocomplete="tel"
                  required
                />
              </label>

              <label class="field">
                <span>Password</span>
                <input
                  id="password"
                  class="input"
                  type="password"
                  autocomplete="new-password"
                  required
                />
              </label>
              <label class="field">
                <span>Confirm Password</span>
                <input
                  id="confirmPassword"
                  class="input"
                  type="password"
                  autocomplete="new-password"
                  required
                />
              </label>

              <div class="sm:col-span-2 flex flex-col sm:flex-row gap-3 pt-2">
                <button class="btn btn-primary w-full" type="submit">
                  Register
                </button>
                <a class="btn btn-ghost w-full" href="/booking.html"
                  >Continue as Guest</a
                >
              </div>

              <p
                id="authMsg"
                class="text-sm sm:text-base text-[var(--muted)] sm:col-span-2 mt-2"
                aria-live="polite"
              ></p>
            </form>
          </div>
        </div>

        <div class="lg:col-span-5">
          <div class="glass rounded-3xl p-6 sm:p-8">
            <h2 class="text-xl font-semibold">Premium booking experience</h2>
            <ul class="mt-4 space-y-3 text-[var(--muted)] text-sm">
              <li>• Interactive calendar with blocked dates</li>
              <li>• Real-time availability checks</li>
              <li>• Admin approval workflow</li>
              <li>• Mobile-first dashboard</li>
            </ul>
          </div>
        </div>
      </div>
    </main>

    <script src="/js/main.js"></script>
    <script src="/js/register.js"></script>
  </body>
</html>
