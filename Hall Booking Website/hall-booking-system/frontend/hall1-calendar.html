<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventSpace — Hall 1 Calendar</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/calendar-premium.css" />
    <link rel="stylesheet" href="/css/booking.css" />
  </head>

  <body class="bg-[var(--bg)] text-[var(--text)] font-[Inter]">
    <header
      class="sticky top-0 z-50 border-b border-white/10 bg-[rgba(10,16,29,0.55)] backdrop-blur-xl"
    >
      <nav
        class="mx-auto max-w-6xl px-4 sm:px-6 py-3 flex items-center justify-between"
      >
        <a
          href="/"
          class="flex items-center gap-2"
          aria-label="EventSpace Home"
        >
          <span
            class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-gradient-to-br from-fuchsia-500 to-cyan-400 text-black font-bold"
            >E</span
          >
          <span class="text-lg font-semibold tracking-tight">EventSpace</span>
        </a>

        <div class="flex items-center gap-3">
          <a class="btn btn-secondary" href="/halls.html">Back</a>
        </div>
      </nav>
    </header>

    <main class="mx-auto max-w-6xl px-4 sm:px-6">
      <section class="py-6 sm:py-10">
        <div class="availability-viewport"></div>
        <div class="flex items-center justify-between gap-4 mb-4">
          <div>
            <div
              class="inline-flex items-center rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-sm text-white/90"
            >
              Hall
            </div>
            <h1 class="mt-3 text-3xl sm:text-4xl font-bold">Hall 1</h1>
            <p class="text-[var(--muted)] mt-2 max-w-2xl">
              Select an available date to continue. Booked dates are blocked.
            </p>
          </div>
        </div>

        <div
          id="calendarShell"
          class="glass rounded-3xl overflow-hidden availability-calendar-shell"
        >
          <div
            class="p-4 sm:p-6 border-b border-white/10 flex items-center justify-between"
          >
            <div class="text-sm text-[var(--muted)]" id="calendarHint"></div>
            <div class="text-xs text-[var(--muted)]">
              Month view • Navigate prev/next
            </div>
          </div>
          <div class="p-0">
            <div id="calendar" class="calendar-full"></div>
          </div>
        </div>
      </section>
    </main>

    <footer
      class="border-t border-white/10 bg-[rgba(10,16,29,0.5)] backdrop-blur-xl"
    >
      <div class="mx-auto max-w-6xl px-4 sm:px-6 py-6">
        <div
          class="flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-[var(--muted)]"
        >
          <div>© <span id="year"></span> EventSpace. All rights reserved.</div>
          <div class="flex gap-4">
            <a class="footer-link" href="/about.html">About</a>
            <a class="footer-link" href="/contact.html">Contact</a>
          </div>
        </div>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="/js/halls.js"></script>
    <script src="/js/calendar.js"></script>

    <script>
      window.__eventspace_hall_calendar = {
        hallSlug: "hall-1",
      };
    </script>
  </body>
</html>
